<!DOCTYPE html>
<html>
    <head><title>Form</title></head>
    <body>
        <h1>Donor Information</h1>
        <center>
        <form method="post">
                <table>
                    <tr>
                        <td><label for="first name*">First Name*</label></td>
                        <td><input type="text" id="first name*" name="first name*" required></td>
                    </tr>
                    <tr>
                        <td><label for="last name*">Last Name*</label></td>
                        <td><input type="text" id="last name*" name="last name*" required></td>
                    </tr>
                    <tr>
                        <td><label for="company">Company</label></td>
                        <td><input type="text" id="company" name="company" required></td>
                    </tr>
                    <tr>
                        <td><label for="address1*">Address 1*</label></td>
                        <td><input type="text" id="address1*" name="address1*" required></td>
                    </tr>
                    <tr>
                        <td><label for="address2*">Address 2*</label></td>
                        <td><input type="text" id="address2*" name="address2*" required></td>
                    </tr>
                    <tr>
                        <td><label for="city*">City*</label></td>
                        <td><input type="text" id="city*" name="city*" required></td>
                    </tr>
                    <tr>
                         <td><label for="state">State*</label></td>
                        <td>
                            <select id="state" name="state" required>
                            <option value="" selected disabled>Select a State</option>
                            <option value="Dhaka">Dhaka</option>
                            <option value="Chattogram">Chattogram</option>
                            <option value="Khulna">Khulna</option>
                            <option value="Rajshahi">Rajshahi</option>
                            <option value="Barishal">Barishal</option>
                            <option value="Sylhet">Sylhet</option>
                            <option value="Rangpur">Rangpur</option>
                            <option value="Mymensingh">Mymensingh</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="zipcode">Zip Code*</label></td>
                        <td><input type="text" pattern="[A-Za-z0-9]{4,}"></td>
                    </tr>
                    <tr>
                         <td><label for="country">Country*</label></td>
                        <td>
                            <select id="country" name="country" required>
                            <option value="" selected disabled>Select a Country</option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="India">India</option>
                            <option value="Pakistan">Pakistan</option>
                            <option value="Nepal">Nepal</option>
                            <option value="Bhutan">Bhutan</option>
                            <option value="Sri Lanka">Sri Lanka</option>
                            <option value="United States">United States</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="phone">Phone</label></td>
                        <td><input type="number" id="phone" name="phone" required></td>
                    </tr>
                    <tr>
                        <td><label for="fax">Fax</label></td>
                        <td><input type="number" id="fax" name="fax" required></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email*</label></td>
                        <td><input type="email" id="email" name="email" required></td>
                    </tr>
                    <tr>
                        <td><label>Donation Amount*</label></td>
                        <td>
                            <input type="radio" name="donationamount" value="none">None
                            <input type="radio" name="donationamount" value="$50">$50
                            <input type="radio" name="donationamount" value="$75">$75
                            <input type="radio" name="donationamount" value="$100">$100
                            <input type="radio" name="donationamount" value="$250">$250
                            <input type="radio" name="donationamount" value="other">Other
                        </td>
                    </tr>
                    <tr>
                        <td>(check a button or type in your<br>amount)</td>
                        <td><label for="other Amount">Other Amount $</label>
                            <input type="number" id="other Amount" name="other Amount">
                        </td>
                    </tr>
                    <tr>
                        <td>Recurring donation</td>
                        <td>
                           <input type="checkbox"> I am interested in giving on a regular basis
                        </td>
                    </tr>
                    <tr>
                        <td>(Check if yes)</td>
                    </tr>
                    <tr>
                       <td></td>
                        <td> Monthly Credit Card $ <input type="text" pattern="[0-9]"> For <input type="text" pattern="[0-9]" > Months </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <br>
                            <input type="Submit" value="Submit">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
        </form>
    </center>
    </body>
</html>
